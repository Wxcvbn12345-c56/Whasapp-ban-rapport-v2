<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LORD AZIZ REPORT 🪬</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
max-width:650px;
margin:auto;
padding:20px;
background:#020202;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* TITRE */

h2{
text-align:center;
color:#ff0000;
letter-spacing:3px;
margin-bottom:25px;
text-shadow:0 0 20px red;
}

/* LOGIN */

.login-container{
background:rgba(10,10,10,0.9);
padding:30px;
border-radius:15px;
border:1px solid #ff0000;
box-shadow:0 0 25px rgba(255,0,0,0.4);
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px red;}
to{box-shadow:0 0 30px red;}
}

label{
display:block;
margin-bottom:6px;
color:#ff4d4d;
}

input{
width:100%;
padding:12px;
margin-bottom:16px;
border-radius:10px;
border:1px solid #ff0000;
background:#050505;
color:white;
}

.login-btn{
background:linear-gradient(90deg,#900000,#ff0000);
border:none;
padding:12px;
width:100%;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
box-shadow:0 0 15px red;
}

.error-msg{
color:#ff3333;
text-align:center;
margin-bottom:10px;
display:none;
}

/* SECTION */

.content-section{
display:none;
}

table{
width:100%;
margin:25px auto;
border-spacing:10px;
}

th{
background:#080808;
padding:12px;
border-left:3px solid red;
color:#ff4040;
border-radius:10px 0 0 10px;
}

td{
background:#050505;
padding:12px;
border-right:3px solid red;
border-radius:0 10px 10px 0;
}

textarea{
width:100%;
height:170px;
background:#070707;
border:1px solid red;
border-radius:10px;
padding:10px;
color:white;
}

/* BOUTON */

.btn-kirim{
display:block;
margin:25px auto;
padding:14px;
width:70%;
background:#ff0000;
border:none;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.btn-kirim:hover{
box-shadow:0 0 20px red;
transform:scale(1.05);
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<h2>LORD AZIZ REPORT 🪬</h2>

<div class="login-container" id="loginSection">

<div class="error-msg" id="errorMsg">
Login incorrect
</div>

<label>Username</label>
<input type="text" id="username">

<label>Password</label>
<input type="password" id="password">

<button class="login-btn" onclick="checkLogin()">LOGIN</button>

<p style="text-align:center;margin-top:10px;">Power by @LORD_X_AZIZ</p>

</div>

<div class="content-section" id="contentSection">

<h3 style="text-align:center;">WHATSAPP BAN REPORT 🚫</h3>

<table>

<tr>
<th>MESSAGE</th>
<td>
<textarea id="message" placeholder="Collez votre message de signalement"></textarea>
</td>
</tr>

</table>

<button class="btn-kirim" onclick="sendEmail()">
ENVOYER 🎯
</button>

</div>

<script>

/* LOGIN */

function checkLogin(){

const user=document.getElementById("username").value;
const pass=document.getElementById("password").value;

if(user==="LORD AZIZ" && pass==="LORD AZIZ123"){

document.getElementById("loginSection").style.display="none";
document.getElementById("contentSection").style.display="block";

}else{

document.getElementById("errorMsg").style.display="block";

}

}

/* ENVOYER EMAIL */

function sendEmail(){

const message=document.getElementById("message").value;

const emails=[

"support@whatsapp.com",
"abuse@whatsapp.com",
"safety@whatsapp.com",
"security@whatsapp.com",
"legal@whatsapp.com",
"report@whatsapp.com",
"contact@whatsapp.com",
"complaint@whatsapp.com",
"service@whatsapp.com",
"team@whatsapp.com",

"abuse@facebook.com",
"security@facebookmail.com",
"support@facebook.com",
"report@fb.com",
"legal@fb.com",

"abuse@meta.com",
"security@meta.com",
"report@meta.com",
"support@meta.com",

"abuse@messenger.com",
"security@messenger.com",

"abuse@instagram.com",
"security@mail.instagram.com",
"report@instagram.com",

"abuse@internet.org",
"security@internet.org",

"report@cybercrime.gov",
"abuse@cybersecurity.com",
"report@internetsecurity.org",
"abuse@securitymail.net"

];

const subject=encodeURIComponent("WhatsApp Abuse Report");
const body=encodeURIComponent(message);

const gmailLink="https://mail.google.com/mail/?view=cm&fs=1&to="+emails.join(",")+"&su="+subject+"&body="+body;

window.location.href=gmailLink;

}

/* ANIMATION ETOILES */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<150;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
d:Math.random()*0.6
});

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=s.d;

if(s.y>canvas.height){
s.y=0;
}

});

ctx.font="70px Arial";
ctx.fillStyle="rgba(255,255,255,0.05)";
ctx.textAlign="center";
ctx.fillText("LORD AZIZ",canvas.width/2,canvas.height/2);

requestAnimationFrame(drawStars);

}

drawStars();

</script>

</body>
</html>
